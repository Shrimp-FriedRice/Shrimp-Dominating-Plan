<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Hungry Brits</title>
    <style>
        :root { --gold: #ffd700; --royal-red: #c8102e; --royal-blue: #002366; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: #0a0a0a;
            font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; touch-action: manipulation;
        }
        
        #game-wrapper { display: none; flex-direction: column; align-items: center; }

        /* Compact UI Header - now right above the maze */
        #ui-header {
            width: 100%; display: flex; justify-content: space-between;
            padding: 8px 15px; background: var(--royal-blue); 
            border: 2px solid var(--gold); border-bottom: none;
            font-weight: bold; font-size: 1.1rem; box-sizing: border-box;
        }

        #game-container { position: relative; border: 2px solid var(--gold); line-height: 0; }
        canvas { display: block; background: #000; }
        
        /* Menus */
        .overlay { 
            text-align: center; z-index: 200; padding: 30px; 
            background: #1a1a1a; border: 4px solid var(--gold); border-radius: 15px; 
        }
        #fail-menu { display: none; position: absolute; top: 50%; transform: translateY(-50%); }

        button { 
            padding: 12px 30px; font-size: 20px; cursor: pointer; 
            background: var(--gold); border: none; border-radius: 8px; 
            font-weight: bold; color: black; margin-top: 15px;
        }

        /* D-Pad */
        #controls {
            display: grid; grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(2, 65px);
            gap: 10px; margin-top: 15px;
        }
        .btn {
            width: 65px; height: 65px; background: rgba(255,255,255,0.1);
            border: 2px solid var(--gold); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            user-select: none;
        }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="menu" class="overlay">
        <h1 style="margin:0; color: var(--gold);">The Hungry Brits 🇬🇧</h1>
        <p>Find the Castle! Watch out for Dynamite.<br>🍲 = +5 | ☕/🍞 = +1 | 🧨 = -3</p>
        <button onclick="startGame()">PLAY NOW</button>
    </div>

    <div id="fail-menu" class="overlay">
        <h2 style="color: var(--royal-red);">TIME EXPIRED!</h2>
        <p>The tea went cold...</p>
        <button onclick="restartRound()">RETRY ROUND</button>
    </div>

    <div id="game-wrapper">
        <div id="ui-header">
            <span>Score: <span id="score">0</span></span>
            <span>Lvl: <span id="level">1</span></span>
            <span>⏱ <span id="timer">60</span>s</span>
        </div>

        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="controls">
            <div class="btn up" onpointerdown="movePlayer(0,-1)">▲</div>
            <div class="btn left" onpointerdown="movePlayer(-1,0)">◀</div>
            <div class="btn down" onpointerdown="movePlayer(0,1)">▼</div>
            <div class="btn right" onpointerdown="movePlayer(1,0)">▶</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0, level = 1, timeLeft = 60, isGameOver = false;
    let gridSize = 17, cellSize = 22;
    let player = { x: 1, y: 1 };
    let maze = [];
    let timerInterval;
    const visibilityRadius = 4;

    function generateMaze(size) {
        maze = Array(size).fill().map(() => Array(size).fill(1));
        function carve(x, y) {
            const dirs = [[0,1],[0,-1],[1,0],[-1,0]].sort(() => Math.random() - 0.5);
            maze[y][x] = 0;
            for (let [dx, dy] of dirs) {
                let nx = x + dx*2, ny = y + dy*2;
                if (nx > 0 && nx < size-1 && ny > 0 && ny < size-1 && maze[ny][nx] === 1) {
                    maze[y+dy][x+dx] = 0; carve(nx, ny);
                }
            }
        }
        carve(1, 1);
        maze[size-2][size-2] = 9; // Exit

        for (let y = 1; y < size-1; y++) {
            for (let x = 1; x < size-1; x++) {
                if (maze[y][x] === 0 && !(x === 1 && y === 1)) {
                    let wallCount = 0;
                    if (maze[y+1][x] === 1) wallCount++;
                    if (maze[y-1][x] === 1) wallCount++;
                    if (maze[y][x+1] === 1) wallCount++;
                    if (maze[y][x-1] === 1) wallCount++;

                    let r = Math.random();
                    if (wallCount >= 3) { // Dead ends
                        if (r < 0.25) maze[y][x] = 4; // TNT
                        else if (r < 0.35) maze[y][x] = 6; // Stew
                        else if (r < 0.7) maze[y][x] = 2; // Food
                    } else if (r < 0.04) {
                        maze[y][x] = (Math.random() < 0.5) ? 2 : 3;
                    }
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                let rx = x * cellSize, ry = y * cellSize;
                if (maze[y][x] === 1) {
                    ctx.fillStyle = '#143317'; ctx.fillRect(rx, ry, cellSize, cellSize);
                } else {
                    ctx.fillStyle = '#3d5e35'; ctx.fillRect(rx, ry, cellSize, cellSize);
                    ctx.font = `${cellSize * 0.7}px serif`;
                    let item = maze[y][x];
                    if (item === 2) ctx.fillText('☕', rx + 1, ry + cellSize * 0.8);
                    if (item === 3) ctx.fillText('🍞', rx + 1, ry + cellSize * 0.8);
                    if (item === 4) ctx.fillText('🧨', rx + 1, ry + cellSize * 0.8);
                    if (item === 6) ctx.fillText('🍲', rx + 1, ry + cellSize * 0.8);
                    if (item === 9) ctx.fillText('🏰', rx + 1, ry + cellSize * 0.8);
                }
            }
        }
        ctx.font = `${cellSize * 0.5}px serif`;
        ctx.fillText('🤴🏻', player.x * cellSize + 1, player.y * cellSize + cellSize * 0.45);
        ctx.fillText('🇬🇧', player.x * cellSize + 1, player.y * cellSize + cellSize * 0.9);

        // Gradient Fog
        ctx.save();
        ctx.globalCompositeOperation = 'destination-in';
        let cx = (player.x + 0.5) * cellSize, cy = (player.y + 0.5) * cellSize;
        let g = ctx.createRadialGradient(cx, cy, cellSize, cx, cy, visibilityRadius * cellSize);
        g.addColorStop(0, 'rgba(0,0,0,1)'); g.addColorStop(0.7, 'rgba(0,0,0,0.6)'); g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
    }

    function movePlayer(dx, dy) {
        if (isGameOver) return;
        let nx = player.x + dx, ny = player.y + dy;
        if (nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize && maze[ny][nx] !== 1) {
            player.x = nx; player.y = ny;
            let item = maze[ny][nx];
            if (item === 2 || item === 3) score += 1;
            if (item === 4) score -= 3;
            if (item === 6) score += 5;
            if (item === 9) { nextLevel(); return; }
            if (item !== 0) maze[ny][nx] = 0;
            document.getElementById('score').innerText = score;
            draw();
        }
    }

    function nextLevel() {
        level++; gridSize += 4;
        cellSize = Math.max(10, 360 / gridSize);
        timeLeft = 60 + (level * 5);
        initRound();
    }

    function restartRound() {
        document.getElementById('fail-menu').style.display = 'none';
        isGameOver = false;
        timeLeft = 60 + (level * 5);
        initRound();
        startTimer();
    }

    function initRound() {
        canvas.width = gridSize * cellSize;
        canvas.height = gridSize * cellSize;
        player = { x: 1, y: 1 };
        generateMaze(gridSize);
        draw();
        document.getElementById('level').innerText = level;
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isGameOver) return;
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                isGameOver = true;
                document.getElementById('fail-menu').style.display = 'block';
            }
        }, 1000);
    }

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-wrapper').style.display = 'flex';
        level = 1; score = 0; gridSize = 17;
        document.getElementById('score').innerText = 0;
        initRound();
        startTimer();
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp' || e.key === 'w') movePlayer(0,-1);
        if (e.key === 'ArrowDown' || e.key === 's') movePlayer(0,1);
        if (e.key === 'ArrowLeft' || e.key === 'a') movePlayer(-1,0);
        if (e.key === 'ArrowRight' || e.key === 'd') movePlayer(1,0);
    });
</script>
</body>
</html>
