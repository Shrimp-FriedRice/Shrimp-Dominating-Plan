<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrimp Earth</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .earth {
            font-size: 80px;
            position: relative;
            z-index: 2;
        }

        .fire {
            font-size: 50px;
            position: absolute;
            top: 60px; /* Positions fire on top of the earth */
            z-index: 3;
            animation: flicker 0.5s infinite alternate;
        }

        .shrimp-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: spin 10s linear infinite;
        }

        .shrimp {
            position: absolute;
            font-size: 40px;
            /* Positioning logic for 8 shrimp in a circle */
            left: 50%;
            top: 50%;
        }

        /* Distributing shrimp around the circle */
        .s1 { transform: translate(-50%, -50%) rotate(0deg) translateY(-120px); }
        .s2 { transform: translate(-50%, -50%) rotate(45deg) translateY(-120px); }
        .s3 { transform: translate(-50%, -50%) rotate(90deg) translateY(-120px); }
        .s4 { transform: translate(-50%, -50%) rotate(135deg) translateY(-120px); }
        .s5 { transform: translate(-50%, -50%) rotate(180deg) translateY(-120px); }
        .s6 { transform: translate(-50%, -50%) rotate(225deg) translateY(-120px); }
        .s7 { transform: translate(-50%, -50%) rotate(270deg) translateY(-120px); }
        .s8 { transform: translate(-50%, -50%) rotate(315deg) translateY(-120px); }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes flicker {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="fire">🔥</div>
        <div class="earth">🌍</div>
        
        <div class="shrimp-ring">
            <div class="shrimp s1">🍤</div>
            <div class="shrimp s2">🍤</div>
            <div class="shrimp s3">🍤</div>
            <div class="shrimp s4">🍤</div>
            <div class="shrimp s5">🍤</div>
            <div class="shrimp s6">🍤</div>
            <div class="shrimp s7">🍤</div>
            <div class="shrimp s8">🍤</div>
        </div>
    </div>

</body>
</html>
