<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cakebatory - Refined</title>
    <style>
        :root {
            --cake-color: #e3c4a8;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #a2d2ff 0%, #ffffff 60%, #4a2e15 60.1%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            align-items: center;
        }

        /* The 40% Table Block */
        .table-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: #5d3a1a;
            border-top: 12px solid #3e2712;
            z-index: 10; /* Table is in front of the chick */
        }

        /* Cake Zone - Sits on the table */
        .cake-zone {
            position: absolute;
            bottom: 40%;
            width: 300px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 15; /* Cake is in front of table and chick */
        }

        .cake-3d {
            position: relative;
            width: 240px;
            height: 150px;
            background: var(--cake-color);
            border-radius: 12px 12px 4px 4px;
            box-shadow: 20px 10px 40px rgba(0,0,0,0.4);
            transition: background-color 0.4s, opacity 0.3s;
        }

        /* Cream/Trim Layers */
        .cream { position: absolute; width: 100%; display: none; pointer-events: none; }
        #cream-bottom { bottom: 0; height: 15px; border-bottom: 10px dotted #fff; }
        #cream-top { top: 0; height: 15px; border-top: 10px dotted #fff; border-radius: 12px 12px 0 0; }
        #cream-surface { top: 20px; height: 10px; border-top: 5px dashed rgba(255,255,255,0.6); }

        /* Toppings */
        .decor { position: absolute; width: 100%; text-align: center; display: none; pointer-events: none; }
        .pos-1 { top: -40px; font-size: 45px; z-index: 20; }
        .pos-2 { top: 10px; display: none; justify-content: space-around; font-size: 28px; z-index: 18; }

        /* The Hidden Chick - Behind the table */
        #chick {
            position: absolute;
            bottom: -350px; /* Fully hidden */
            left: 50%;
            transform: translateX(-50%);
            font-size: 220px;
            z-index: 5; /* Behind the table-area and cake */
            transition: bottom 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        /* UI Panel */
        .ui-panel {
            position: relative;
            z-index: 100;
            margin-top: 30px;
            text-align: center;
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-width: 350px;
        }

        .options { display: none; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 15px 0; }
        
        button {
            padding: 10px 16px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #f0f0f0; }
        button.selected { background: #ffefba; border-color: #e67e22; }
        
        #next-btn { background: #4caf50; color: white; border: none; padding: 15px 30px; margin-top: 10px; }
        .restart-btn { background: #ff6b6b; color: white; border: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1 id="title">Cakebatory</h1>
        <button id="play-btn">START</button>

        <div id="step-1" class="options">
            <button onclick="setFrosting('#5d3a1a', this)">Dark Choc</button>
            <button onclick="setFrosting('#8b4513', this)">Chocolate</button>
            <button onclick="setFrosting('#ffb7c5', this)">Strawberry</button>
            <button onclick="setFrosting('#fff9e3', this)">Vanilla</button>
            <button onclick="setFrosting('#9dc183', this)">Matcha</button>
        </div>

        <div id="step-2" class="options">
            <button onclick="toggleItem('cream-bottom')">Base Trim (Bottom)</button>
            <button onclick="toggleItem('cream-top')">Crown Trim (Top)</button>
            <button onclick="toggleItem('cream-surface')">Surface Dollops</button>
        </div>

        <div id="step-3" class="options">
            <button onclick="toggleItem('cherry1')">Cherry (1)</button>
            <button onclick="toggleItem('cherry2')">Cherry (2)</button>
            <button onclick="toggleItem('choc1')">Choc Bar (1)</button>
            <button onclick="toggleItem('choc2')">Choc Bar (2)</button>
            <button onclick="toggleItem('cookie1')">Cookie (1)</button>
            <button onclick="toggleItem('cookie2')">Cookie (2)</button>
            <button onclick="toggleItem('straw1')">Strawberry (1)</button>
            <button onclick="toggleItem('straw2')">Strawberry (2)</button>
        </div>

        <div id="restart-area" class="hidden">
            <p><strong>The creature loves the cake</strong></p>
            <button class="restart-btn" onclick="location.reload()">Restart Experiment</button>
        </div>
        
        <button id="next-btn" class="hidden">Next ➔</button>
    </div>

    <div class="cake-zone">
        <div class="cake-3d" id="cake">
            <div id="cream-bottom" class="cream"></div>
            <div id="cream-top" class="cream"></div>
            <div id="cream-surface" class="cream"></div>
            
            <div id="cherry1" class="decor pos-1">🍒</div>
            <div id="choc1" class="decor pos-1">🍫</div>
            <div id="cookie1" class="decor pos-1">🍪</div>
            <div id="straw1" class="decor pos-1">🍓</div>
            <div id="cherry2" class="decor pos-2"><span>🍒</span><span>🍒</span><span>🍒</span></div>
            <div id="choc2" class="decor pos-2"><span>🍫</span><span>🍫</span><span>🍫</span></div>
            <div id="cookie2" class="decor pos-2"><span>🍪</span><span>🍪</span><span>🍪</span></div>
            <div id="straw2" class="decor pos-2"><span>🍓</span><span>🍓</span><span>🍓</span></div>
        </div>
    </div>

    <div id="chick">🐥</div>

    <div class="table-area"></div>

    <script>
        const nextBtn = document.getElementById('next-btn');
        const title = document.getElementById('title');
        let currentStep = 0;

        document.getElementById('play-btn').onclick = function() {
            this.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            showStep(1);
        };

        nextBtn.onclick = () => {
            currentStep++;
            if(currentStep === 2) showStep(2);
            else if(currentStep === 3) showStep(3);
            else finishCake();
        };

        function showStep(s) {
            currentStep = s;
            document.querySelectorAll('.options').forEach(o => o.style.display = 'none');
            document.getElementById(`step-${s}`).style.display = 'flex';
            if(s === 1) title.innerText = "Choose a Frosting";
            if(s === 2) title.innerText = "Cream & Trim Placement";
            if(s === 3) title.innerText = "Final Decorations";
        }

        function setFrosting(color, btn) {
            document.documentElement.style.setProperty('--cake-color', color);
            // Highlight selected button but allow switching
            document.querySelectorAll('#step-1 button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function toggleItem(id) {
            const el = document.getElementById(id);
            const isFlex = id.includes('2') || id === 'cream-surface'; 
            const displayType = isFlex ? 'flex' : 'block';
            el.style.display = (el.style.display === displayType) ? 'none' : displayType;
        }

        function finishCake() {
            nextBtn.classList.add('hidden');
            document.querySelectorAll('.options').forEach(o => o.style.display = 'none');
            title.innerText = "Be quiet... something is coming.";

            const chick = document.getElementById('chick');
            const cake = document.getElementById('cake');

            setTimeout(() => {
                // Chick lunges up from behind the table
                chick.style.bottom = "35%"; 
                setTimeout(() => {
                    cake.style.opacity = "0"; 
                    setTimeout(() => {
                        chick.style.bottom = "-400px"; // Recedes
                        document.getElementById('restart-area').classList.remove('hidden');
                        title.classList.add('hidden');
                    }, 800);
                }, 400);
            }, 1000);
        }
    </script>
</body>
</html>
