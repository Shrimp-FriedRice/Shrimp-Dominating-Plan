<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Hungry Brits</title>
    <style>
        :root { --gold: #ffd700; --royal-blue: #002366; --glass: rgba(255,255,255,0.1); }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background: #050505;
            font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; touch-action: none;
        }
        
        /* Legend / Guide */
        #legend {
            width: 340px; font-size: 10px; display: flex; justify-content: space-around;
            background: #222; padding: 4px 0; border: 1px solid #444; border-radius: 5px 5px 0 0;
        }

        #ui-header {
            width: 340px; display: flex; justify-content: space-between;
            padding: 8px 15px; background: var(--royal-blue); border: 2px solid var(--gold);
            font-weight: bold; box-sizing: border-box;
        }

        #game-container { position: relative; border: 2px solid var(--gold); background: #000; overflow: hidden; }
        canvas { display: block; }

        /* Market Section */
        #market {
            width: 340px; background: #1a1a1a; border: 2px solid var(--gold); border-top: none;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 5px; box-sizing: border-box;
        }
        .shop-item {
            background: var(--glass); padding: 5px; border-radius: 5px; text-align: center; font-size: 11px;
            cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .shop-item:active { background: var(--gold); color: black; }
        .shop-item b { display: block; font-size: 16px; }

        /* Thumbstick */
        #stick-container {
            position: fixed; bottom: 30px; right: 30px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #stick { width: 40px; height: 40px; background: var(--gold); border-radius: 50%; position: relative; }

        #status-bar { font-size: 12px; color: var(--gold); margin-top: 5px; height: 15px; font-weight: bold; }
        .overlay { text-align: center; padding: 25px; background: #111; border: 3px solid var(--gold); border-radius: 15px; position: absolute; z-index: 100; }
        button { padding: 12px 25px; font-size: 18px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="menu" class="overlay">
        <h1 style="color:var(--gold); margin:0 0 10px 0;">The Hungry Brits 🇬🇧</h1>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="fail-menu" class="overlay" style="display:none">
        <h2 style="color: #ff4444">TEA TIME OVER!</h2>
        <button onclick="restartRound()">RETRY ROUND</button>
    </div>

    <div id="game-ui" style="display:none">
        <div id="legend">
            <span>☕/🍞 +1</span> <span>🍲 +5</span> <span style="color:#ff4444">🧨 -3</span> <span>🏰 EXIT</span>
        </div>
        <div id="ui-header">
            <span>Pts: <span id="score">0</span></span>
            <span>Lvl: <span id="level">1</span></span>
            <span>⏱ <span id="timer">80</span>s</span>
        </div>

        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="market">
            <div class="shop-item" onclick="buyItem('speed')"><b>🧀</b>Speed (10)</div>
            <div class="shop-item" onclick="buyItem('shield')"><b>🥧</b>Anti-TNT (12)</div>
            <div class="shop-item" onclick="buyItem('guide')"><b>🍯</b>Guide (30)</div>
        </div>
        <div id="status-bar"></div>
    </div>

    <div id="stick-container" style="display:none"><div id="stick"></div></div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status-bar');

    let score = 0, level = 1, timeLeft = 80, isRunning = false;
    let gridSize = 15, cellSize = 32;
    let player = { x: 0, y: 0, speed: 1.8 };
    let maze = [], items = [], solutionPath = [], timerInterval;
    
    let powers = { speed: 0, shield: 0, guide: false };
    let stick = { active: false, moveX: 0, moveY: 0 };

    function setupInput() {
        const handleStart = (e) => { if(e.target.closest('#stick-container')) stick.active = true; };
        const handleMove = (e) => {
            if(!stick.active) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = document.getElementById('stick-container').getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            const dx = touch.clientX - centerX;
            const dy = touch.clientY - centerY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            stick.moveX = (Math.cos(angle) * dist) / 40;
            stick.moveY = (Math.sin(angle) * dist) / 40;
            document.getElementById('stick').style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        };
        const handleEnd = () => {
            stick.active = false; stick.moveX = 0; stick.moveY = 0;
            document.getElementById('stick').style.transform = `translate(0,0)`;
        };
        window.addEventListener('touchstart', handleStart); window.addEventListener('mousedown', handleStart);
        window.addEventListener('touchmove', handleMove); window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchend', handleEnd); window.addEventListener('mouseup', handleEnd);
    }

    function buyItem(type) {
        if(type === 'speed' && score >= 10) { score -= 10; powers.speed += 20; }
        if(type === 'shield' && score >= 12) { score -= 12; powers.shield += 30; }
        if(type === 'guide' && score >= 30) { score -= 30; powers.guide = true; findPath(); }
        document.getElementById('score').innerText = score;
    }

    function generateMaze(size) {
        maze = Array(size).fill().map(() => Array(size).fill(1));
        function carve(x, y) {
            const dirs = [[0,1],[0,-1],[1,0],[-1,0]].sort(() => Math.random() - 0.5);
            maze[y][x] = 0;
            for (let [dx, dy] of dirs) {
                let nx = x + dx*2, ny = y + dy*2;
                if (nx > 0 && nx < size-1 && ny > 0 && ny < size-1 && maze[ny][nx] === 1) {
                    maze[y+dy][x+dx] = 0; carve(nx, ny);
                }
            }
        }
        carve(1, 1);
        maze[size-2][size-2] = 9;
        items = [];
        for(let y=1; y<size-1; y++) {
            for(let x=1; x<size-1; x++) {
                if(maze[y][x] === 0 && !(x===1 && y===1)) {
                    let r = Math.random();
                    if(r < 0.1) items.push({x: x*cellSize + cellSize/2, y: y*cellSize + cellSize/2, type: r < 0.015 ? 6 : (r < 0.04 ? 4 : (Math.random() > 0.5 ? 2 : 3))});
                }
            }
        }
    }

    // Honey Logic: BFS to find the path to the castle
    function findPath() {
        let start = {x: Math.floor(player.x/cellSize), y: Math.floor(player.y/cellSize)};
        let target = {x: gridSize-2, y: gridSize-2};
        let queue = [[start]];
        let visited = new Set();
        visited.add(`${start.x},${start.y}`);

        while(queue.length > 0) {
            let path = queue.shift();
            let curr = path[path.length-1];
            if(curr.x === target.x && curr.y === target.y) { solutionPath = path; return; }
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy]) => {
                let nx = curr.x+dx, ny = curr.y+dy;
                if(nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize && maze[ny][nx] !== 1 && !visited.has(`${nx},${ny}`)) {
                    visited.add(`${nx},${ny}`);
                    queue.push([...path, {x: nx, y: ny}]);
                }
            });
        }
    }

    function checkCollision(nx, ny) {
        let p = 6; // Hitbox padding
        let corners = [{x: nx-p, y: ny-p}, {x: nx+p, y: ny-p}, {x: nx-p, y: ny+p}, {x: nx+p, y: ny+p}];
        return corners.every(c => maze[Math.floor(c.y/cellSize)][Math.floor(c.x/cellSize)] !== 1);
    }

    function update() {
        if(!isRunning) return;
        let s = (powers.speed > 0) ? player.speed * 1.8 : player.speed;
        if(checkCollision(player.x + stick.moveX*s, player.y)) player.x += stick.moveX*s;
        if(checkCollision(player.x, player.y + stick.moveY*s)) player.y += stick.moveY*s;

        items = items.filter(it => {
            if(Math.sqrt((player.x - it.x)**2 + (player.y - it.y)**2) < 15) {
                if(it.type === 2 || it.type === 3) score += 1;
                else if(it.type === 4 && powers.shield <= 0) score -= 3;
                else if(it.type === 6) score += 5;
                document.getElementById('score').innerText = score;
                return false;
            }
            return true;
        });

        if(maze[Math.floor(player.y/cellSize)][Math.floor(player.x/cellSize)] === 9) nextLevel();
        if(powers.speed > 0) powers.speed -= 1/60;
        if(powers.shield > 0) powers.shield -= 1/60;
        
        statusEl.innerText = (powers.speed > 0 ? `⚡SPEED ` : "") + (powers.shield > 0 ? `🛡️SHIELD` : "");
        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        for(let y=0; y<gridSize; y++) {
            for(let x=0; x<gridSize; x++) {
                let rx = x*cellSize, ry = y*cellSize;
                if(maze[y][x] === 1) { ctx.fillStyle = '#143317'; ctx.fillRect(rx, ry, cellSize, cellSize); }
                else if(maze[y][x] === 9) { ctx.font = '22px serif'; ctx.fillText('🏰', rx+4, ry+24); }
            }
        }
        
        if(powers.guide) {
            ctx.strokeStyle = "rgba(255, 215, 0, 0.6)"; ctx.lineWidth = 4; ctx.beginPath();
            solutionPath.forEach((p, i) => { if(i===0) ctx.moveTo(p.x*cellSize+cellSize/2, p.y*cellSize+cellSize/2); else ctx.lineTo(p.x*cellSize+cellSize/2, p.y*cellSize+cellSize/2); });
            ctx.stroke();
        }

        items.forEach(it => {
            ctx.font = '18px serif';
            ctx.fillText(it.type === 2 ? '☕' : (it.type === 3 ? '🍞' : (it.type === 4 ? '🧨' : '🍲')), it.x-10, it.y+8);
        });

        ctx.font = '14px serif';
        ctx.fillText('🤴🏻', player.x-8, player.y-2); ctx.fillText('🇬🇧', player.x-8, player.y+10);

        ctx.save();
        ctx.globalCompositeOperation = 'destination-in';
        let grad = ctx.createRadialGradient(player.x, player.y, 20, player.x, player.y, 130);
        grad.addColorStop(0, 'black'); grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad; ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.restore();
    }

    function startGame() {
        document.getElementById('menu').style.display='none';
        document.getElementById('game-ui').style.display='block';
        document.getElementById('stick-container').style.display='flex';
        level=1; score=0; gridSize=15; isRunning=true;
        initRound(); setupInput(); update(); startTimer();
    }

    function initRound() {
        cellSize = 340 / gridSize; canvas.width = 340; canvas.height = 340;
        player.x = cellSize * 1.5; player.y = cellSize * 1.5;
        powers.guide = false; solutionPath = [];
        generateMaze(gridSize);
        document.getElementById('level').innerText = level;
        document.getElementById('score').innerText = score;
    }

    function nextLevel() { level++; gridSize += 2; initRound(); timeLeft += 40; }
    function restartRound() {
        document.getElementById('fail-menu').style.display='none';
        isRunning = true; timeLeft = 80 + (level*5); startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!isRunning) return;
            timeLeft--; document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) { isRunning = false; document.getElementById('fail-menu').style.display='block'; }
        }, 1000);
    }
</script>
</body>
</html>
