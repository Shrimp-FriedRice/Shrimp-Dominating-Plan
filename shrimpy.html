<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shrimp Maze Murder</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: #ff4757;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        h1 { margin: 10px 0; text-shadow: 0 0 8px rgba(255, 71, 87, 0.6); }

        #game-container {
            position: relative;
            width: 360px; /* Fixed size for maze math */
            height: 360px;
            background-color: #2f3542;
            border: 4px solid #ff4757;
            border-radius: 8px;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .shrimp {
            position: absolute;
            font-size: 28px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 5;
        }

        #player-shrimp {
            z-index: 10;
            filter: drop-shadow(0 0 10px gold);
        }

        .knife {
            position: absolute;
            font-size: 20px;
            /* Positioning the knife relative to the shrimp */
            right: -15px;
            top: -5px;
            transform-origin: -10px 20px;
            animation: spin 0.4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .death-ring {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid red;
            border-radius: 50%;
            z-index: 2;
            animation: ripple 0.3s ease-out forwards;
        }

        @keyframes ripple {
            from { transform: scale(0.5); opacity: 1; }
            to { transform: scale(2); opacity: 0; }
        }

        #ui { margin-top: 15px; font-size: 24px; font-weight: bold; color: #ffa502; }
    </style>
</head>
<body>

    <h1>KILL THEM ALL</h1>

    <div id="game-container">
        <canvas id="mazeCanvas"></canvas>
        <div id="player-shrimp" class="shrimp">
            🍤
            <div class="knife">🔪</div>
        </div>
    </div>

    <div id="ui">Victims Cleared: <span id="score">0</span></div>

    <script>
        const container = document.getElementById('game-container');
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const player = document.getElementById('player-shrimp');
        const scoreDisplay = document.getElementById('score');

        const gridSize = 12; // 12x12 grid
        const cellSize = 30; // 360 / 12
        canvas.width = 360;
        canvas.height = 360;

        let score = 0;
        let victims = [];
        let pX = 180, pY = 180;
        let maze = [];

        // Maze Generation (Recursive Backtracking)
        function generateMaze() {
            maze = Array(gridSize).fill().map(() => Array(gridSize).fill(1));
            let stack = [];
            let start = {x: 1, y: 1};
            maze[1][1] = 0;
            stack.push(start);

            while (stack.length > 0) {
                let curr = stack[stack.length - 1];
                let neighbors = [];

                const dirs = [{x:0, y:-2}, {x:0, y:2}, {x:-2, y:0}, {x:2, y:0}];
                dirs.forEach(d => {
                    let nx = curr.x + d.x, ny = curr.y + d.y;
                    if (nx > 0 && nx < gridSize - 1 && ny > 0 && ny < gridSize - 1 && maze[ny][nx] === 1) {
                        neighbors.push({x: nx, y: ny});
                    }
                });

                if (neighbors.length > 0) {
                    let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    maze[next.y][next.x] = 0;
                    maze[curr.y + (next.y - curr.y) / 2][curr.x + (next.x - curr.x) / 2] = 0;
                    stack.push(next);
                } else {
                    stack.pop();
                }
            }
            drawMaze();
        }

        function drawMaze() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#1e272e"; // Wall color
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
        }

        // Controls
        function handleMove(e) {
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            pX = clientX - rect.left;
            pY = clientY - rect.top;
        }

        container.addEventListener('mousemove', handleMove);
        container.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, { passive: false });

        function spawnVictims() {
            victims.forEach(v => container.removeChild(v.el));
            victims = [];
            for (let i = 0; i < 7; i++) {
                const el = document.createElement('div');
                el.className = 'shrimp';
                el.innerHTML = '🍤';
                container.appendChild(el);
                
                let vx, vy;
                do {
                    vx = Math.floor(Math.random() * gridSize);
                    vy = Math.floor(Math.random() * gridSize);
                } while (maze[vy][vx] === 1);

                victims.push({
                    el: el,
                    x: vx * cellSize,
                    y: vy * cellSize,
                    dx: (Math.random() - 0.5) * 2,
                    dy: (Math.random() - 0.5) * 2
                });
            }
        }

        function gameLoop() {
            player.style.left = (pX - 20) + 'px';
            player.style.top = (pY - 20) + 'px';

            for (let i = victims.length - 1; i >= 0; i--) {
                let v = victims[i];
                v.x += v.dx;
                v.y += v.dy;

                // Victim wall collision
                let gx = Math.floor((v.x + 20) / cellSize);
                let gy = Math.floor((v.y + 20) / cellSize);
                if (gx < 0 || gx >= gridSize || gy < 0 || gy >= gridSize || maze[gy][gx] === 1) {
                    v.dx *= -1; v.dy *= -1;
                }

                v.el.style.left = v.x + 'px';
                v.el.style.top = v.y + 'px';

                // KILL LOGIC: Touch or Knife range
                const dist = Math.hypot(v.x + 20 - pX, v.y + 20 - pY);
                if (dist < 45) { // Increased range for the knife
                    const ring = document.createElement('div');
                    ring.className = 'death-ring';
                    ring.style.left = v.x + 'px';
                    ring.style.top = v.y + 'px';
                    container.appendChild(ring);
                    setTimeout(() => ring.remove(), 300);

                    container.removeChild(v.el);
                    victims.splice(i, 1);
                    score++;
                    scoreDisplay.innerText = score;
                }
            }

            if (victims.length === 0) {
                generateMaze();
                spawnVictims();
            }
            requestAnimationFrame(gameLoop);
        }

        generateMaze();
        spawnVictims();
        gameLoop();
    </script>
</body>
</html>
