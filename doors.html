<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Doors of Fate</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #ui { margin-bottom: 20px; text-align: center; }
        #lives { color: #ff4d4d; font-size: 2rem; }
        
        .door-container { display: flex; gap: 20px; }
        .door {
            font-size: 5rem;
            cursor: pointer;
            transition: transform 0.2s;
            background: none;
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 10px;
        }
        .door:hover { transform: scale(1.1); border-color: #555; }

        /* Jumpscare Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #jumpscare-img { max-width: 80%; max-height: 70vh; }
        #message { font-size: 2.5rem; margin-top: 20px; font-weight: bold; }
        button {
            margin-top: 20px; padding: 10px 20px;
            font-size: 1.2rem; cursor: pointer;
            background: #444; color: white; border: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Choose Your Fate</h1>
        <div id="lives">❤️❤️❤️</div>
        <p id="room-info">A new room awaits...</p>
    </div>

    <div class="door-container" id="door-box">
        </div>

    <div id="overlay">
        <img id="jumpscare-img" src="" alt="JUMPSCARE">
        <div id="message"></div>
        <button onclick="closeOverlay()">Continue...</button>
    </div>

    <script>
        let lives = 3;
        const doorBox = document.getElementById('door-box');
        const livesDisplay = document.getElementById('lives');
        const overlay = document.getElementById('overlay');
        const jumpImg = document.getElementById('jumpscare-img');
        const jumpMsg = document.getElementById('message');

        function updateLivesDisplay() {
            livesDisplay.innerText = "❤️".repeat(lives);
            if (lives <= 0) {
                alert("GAME OVER! You ran out of lives.");
                lives = 3;
                generateRoom();
            }
        }

        function generateRoom() {
            doorBox.innerHTML = '';
            updateLivesDisplay();
            
            // Randomly decide if this room is "Safe" (1 logo) or "Dangerous" (2 logos)
            const logoCount = Math.random() > 0.5 ? 1 : 2;
            const doorTypes = ['🚪', '🪜'];
            
            // Create 3 door objects
            let positions = [0, 1, 2].sort(() => Math.random() - 0.5);
            let doorData = new Array(3);

            // Assign the "Loss" doors (logo.png)
            for(let i = 0; i < logoCount; i++) {
                doorData[positions.pop()] = "lose";
            }

            // Assign the "Gamble" doors to remaining slots
            while(positions.length > 0) {
                doorData[positions.pop()] = "gamble";
            }

            // Render doors
            doorData.forEach(type => {
                const doorIcon = doorTypes[Math.floor(Math.random() * doorTypes.length)];
                const btn = document.createElement('button');
                btn.className = 'door';
                btn.innerText = doorIcon;
                btn.onclick = () => handleChoice(type, doorIcon);
                doorBox.appendChild(btn);
            });
        }

        function handleChoice(fate, icon) {
            // Weights change based on door icon
            // 🪜 has higher logo chance handled by 'fate' logic, 
            // but let's adjust the gamble results here:
            
            if (fate === "lose") {
                triggerResult("logo.png", "You lose 1 life, YAY!", -1);
            } else {
                // Gamble Logic
                const roll = Math.random();
                // Higher chance of "Nothing" (0.6)
                // Lower chance of "Revive" or "King"
                let reviveChance = (icon === '🪜') ? 0.25 : 0.15; 
                
                if (roll < reviveChance) {
                    if (lives < 3) {
                        triggerResult("https://via.placeholder.com/400?text=HP+UP", "You found a heart!", 1);
                    } else {
                        triggerResult("https://via.placeholder.com/400?text=FULL+HP", "Full health, nothing happened.", 0);
                    }
                } else if (roll < 0.4) {
                    // The King Jumpscare (No life lost)
                    triggerResult("https://via.placeholder.com/400?text=🤴+🇬🇧", "The King spares you...", 0);
                } else {
                    // Nothing happens
                    alert("The room was empty. Moving on...");
                    generateRoom();
                }
            }
        }

        function triggerResult(imgSrc, text, lifeMod) {
            lives += lifeMod;
            if (lives > 3) lives = 3;
            
            jumpImg.src = imgSrc;
            jumpMsg.innerText = text;
            overlay.style.display = 'flex';
        }

        function closeOverlay() {
            overlay.style.display = 'none';
            generateRoom();
        }

        // Initialize first room
        generateRoom();
    </script>
</body>
</html>
