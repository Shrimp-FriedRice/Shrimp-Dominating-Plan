<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Fog Maze</title>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #1a1a1a;
            font-family: sans-serif; color: white; overflow: hidden; touch-action: manipulation;
        }
        #ui { position: absolute; top: 10px; display: flex; gap: 20px; font-size: 18px; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; }
        #game-container { position: relative; border: 4px solid #ffd700; display: none; }
        canvas { display: block; background: #000; }
        
        /* Menu Styles */
        #menu { text-align: center; z-index: 20; padding: 20px; border-radius: 15px; background: #2e7d32; border: 4px solid #ffd700; }
        button { padding: 15px 40px; font-size: 24px; cursor: pointer; background: #ffd700; border: none; border-radius: 10px; font-weight: bold; }

        /* Touch Controls */
        #controls {
            display: none; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px);
            gap: 10px; margin-top: 20px; z-index: 10;
        }
        .btn {
            width: 60px; height: 60px; background: rgba(255,255,255,0.2);
            border: 2px solid white; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.5); }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>🤴🏻 Royal Escape 🇬🇧</h1>
        <p>The garden is dark! You can only see 3 blocks ahead.</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="ui">
        <span>Score: <span id="score">0</span></span>
        <span>Lvl: <span id="level">1</span></span>
        <span>Time: <span id="timer">40</span>s</span>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controls">
        <div class="btn up" ontouchstart="movePlayer(0,-1)" onmousedown="movePlayer(0,-1)">▲</div>
        <div class="btn left" ontouchstart="movePlayer(-1,0)" onmousedown="movePlayer(-1,0)">◀</div>
        <div class="btn down" ontouchstart="movePlayer(0,1)" onmousedown="movePlayer(0,1)">▼</div>
        <div class="btn right" ontouchstart="movePlayer(1,0)" onmousedown="movePlayer(1,0)">▶</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0, level = 1, timeLeft = 40;
    let gridSize = 15; // Starting bigger
    let cellSize = 30;
    let player = { x: 1, y: 1 };
    let maze = [];
    let timerInterval;
    const visibilityRadius = 3;

    function generateMaze(size) {
        maze = Array(size).fill().map(() => Array(size).fill(1));
        function carve(x, y) {
            const dirs = [[0,1],[0,-1],[1,0],[-1,0]].sort(() => Math.random() - 0.5);
            maze[y][x] = 0;
            for (let [dx, dy] of dirs) {
                let nx = x + dx*2, ny = y + dy*2;
                if (nx > 0 && nx < size-1 && ny > 0 && ny < size-1 && maze[ny][nx] === 1) {
                    maze[y+dy][x+dx] = 0; carve(nx, ny);
                }
            }
        }
        carve(1, 1);
        maze[size-2][size-2] = 5; // Exit 🏰

        // Random Items
        for (let i = 0; i < (size + level * 3); i++) {
            placeItem(2); // ☕
            placeItem(3); // 🍞
            placeItem(4); // 🧨
        }
    }

    function placeItem(type) {
        let placed = false;
        while (!placed) {
            let rx = Math.floor(Math.random() * gridSize), ry = Math.floor(Math.random() * gridSize);
            if (maze[ry][rx] === 0 && !(rx === 1 && ry === 1)) { maze[ry][rx] = type; placed = true; }
        }
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                // Distance check for Fog of War
                let dist = Math.sqrt(Math.pow(x - player.x, 2) + Math.pow(y - player.y, 2));
                
                if (dist <= visibilityRadius) {
                    let rx = x * cellSize, ry = y * cellSize;
                    if (maze[y][x] === 1) {
                        ctx.fillStyle = '#2e7d32'; // Bush
                        ctx.fillRect(rx, ry, cellSize, cellSize);
                    } else {
                        ctx.fillStyle = '#558b2f'; // Path
                        ctx.fillRect(rx, ry, cellSize, cellSize);
                        ctx.font = `${cellSize * 0.7}px serif`;
                        if (maze[y][x] === 2) ctx.fillText('☕', rx + 2, ry + cellSize * 0.8);
                        if (maze[y][x] === 3) ctx.fillText('🍞', rx + 2, ry + cellSize * 0.8);
                        if (maze[y][x] === 4) ctx.fillText('🧨', rx + 2, ry + cellSize * 0.8);
                        if (maze[y][x] === 5) ctx.fillText('🏰', rx + 2, ry + cellSize * 0.8);
                    }
                }
            }
        }
        // Draw Player
        ctx.font = `${cellSize * 0.5}px serif`;
        ctx.fillText('🤴🏻', player.x * cellSize + 2, player.y * cellSize + cellSize * 0.45);
        ctx.fillText('🇬🇧', player.x * cellSize + 2, player.y * cellSize + cellSize * 0.9);
    }

    function movePlayer(dx, dy) {
        let nx = player.x + dx, ny = player.y + dy;
        if (nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize && maze[ny][nx] !== 1) {
            player.x = nx; player.y = ny;
            let item = maze[ny][nx];
            if (item === 2 || item === 3) score += 1;
            if (item === 4) score -= 3;
            if (item === 5) { nextLevel(); return; }
            if (item !== 0) maze[ny][nx] = 0;
            document.getElementById('score').innerText = score;
            draw();
        }
    }

    function nextLevel() {
        level++;
        gridSize += 4;
        cellSize = Math.max(15, 450 / gridSize);
        timeLeft = 40 + (level * 5);
        initRound();
    }

    function initRound() {
        canvas.width = gridSize * cellSize;
        canvas.height = gridSize * cellSize;
        player = { x: 1, y: 1 };
        generateMaze(gridSize);
        draw();
    }

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('controls').style.display = 'grid';
        level = 1; score = 0; gridSize = 15;
        initRound();
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) { alert("Timeout! Try again."); initRound(); timeLeft = 40 + (level * 5); }
        }, 1000);
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp') movePlayer(0,-1);
        if (e.key === 'ArrowDown') movePlayer(0,1);
        if (e.key === 'ArrowLeft') movePlayer(-1,0);
        if (e.key === 'ArrowRight') movePlayer(1,0);
    });
</script>
</body>
</html>
