<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Doors of 'Fate'</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #ui { margin-bottom: 20px; text-align: center; }
        #ui h1 { color: #f0e68c; font-weight: normal; font-size: 1.5rem;}
        #lives { color: #ff4d4d; font-size: 2.5rem; letter-spacing: 5px; }
        
        .door-container { display: flex; gap: 20px; }
        .door {
            font-size: 5rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
            background: none;
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 10px;
        }
        .door:hover { transform: scale(1.1); border-color: #555; }

        /* General Overlay for all outcomes */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        /* The Logo.png Jumpscare */
        #logo-jumpscare {
            display: none;
            max-width: 80%;
            max-height: 70vh;
        }

        /* The King Jumpscare (No damage) */
        #king-display {
            display: none;
            font-size: 10rem;
            line-height: 1;
        }
        #king-display #uk-flag {
            font-size: 5rem;
            display: block;
            margin-top: -20px;
        }

        /* Explosion / Safe Visuals */
        #big-explosion {
            display: none;
            font-size: 15rem;
        }

        #message { font-size: 2.5rem; margin-top: 20px; font-weight: bold; }
        
        button#continue-btn {
            margin-top: 20px; padding: 10px 20px;
            font-size: 1.2rem; cursor: pointer;
            background: #444; color: white; border: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Choose your <em>trusted</em> doors. (Because that always ends well)</h1>
        <div id="lives">❤❤❤</div>
    </div>

    <div class="door-container" id="door-box">
        </div>

    <div id="overlay">
        <img id="logo-jumpscare" src="logo.png" alt="FATAL LOGO">
        
        <div id="king-display">
            <div>🤴</div>
            <div id="uk-flag">🇬🇧</div>
        </div>

        <div id="big-explosion">💥</div>

        <div id="message"></div>
        <button id="continue-btn" onclick="closeOverlay()">Oh, good.</button>
    </div>

    <script>
        let lives = 3;
        const maxLives = 3;
        const doorBox = document.getElementById('door-box');
        const livesDisplay = document.getElementById('lives');
        
        // Overlay Elements
        const overlay = document.getElementById('overlay');
        const logoImg = document.getElementById('logo-jumpscare');
        const kingDisplay = document.getElementById('king-display');
        const explosionDisplay = document.getElementById('big-explosion');
        const jumpMsg = document.getElementById('message');
        const continueBtn = document.getElementById('continue-btn');

        function updateLivesDisplay() {
            // Replaces the dynamic removal with a fixed 3-slot display (❤ or 🖤)
            let currentHearts = "❤".repeat(lives);
            let lostHearts = "🖤".repeat(maxLives - lives);
            livesDisplay.innerText = currentHearts + lostHearts;

            if (lives <= 0) {
                setTimeout(() => {
                    alert("GAME OVER! You ran out of 'trust'.");
                    lives = 3;
                    generateRoom();
                }, 500); // Small delay to see the final 🖤
            }
        }

        function generateRoom() {
            doorBox.innerHTML = '';
            // Reset visibility for overlay elements (in case closeOverlay missed it)
            logoImg.style.display = 'none';
            kingDisplay.style.display = 'none';
            explosionDisplay.style.display = 'none';

            updateLivesDisplay();
            
            // Randomly decide if this room has 1 (Safe) or 2 (Dangerous) logo doors.
            const logoCount = Math.random() > 0.5 ? 1 : 2;
            
            // Randomly pick which *type* of doors appear (mostly 🚪 or 🪜)
            let visualDoors = ['🚪', '🚪', '🪜'].sort(() => Math.random() - 0.5);

            // Setup fates
            let availableFates = ['gamble', 'gamble', 'gamble'];
            let lossPositions = [0, 1, 2].sort(() => Math.random() - 0.5);

            // Assign the "Loss" doors
            for(let i = 0; i < logoCount; i++) {
                availableFates[lossPositions.pop()] = "lose";
            }

            // Render doors
            availableFates.forEach((fate, index) => {
                const btn = document.createElement('button');
                btn.className = 'door';
                btn.innerText = visualDoors[index]; // 🚪 or 🪜
                btn.onclick = (e) => handleChoice(fate, visualDoors[index], e.target);
                doorBox.appendChild(btn);
            });
        }

        function handleChoice(fate, icon, doorElement) {
            // Animate door disappearance
            doorElement.style.opacity = '0';
            doorElement.style.pointerEvents = 'none';

            if (fate === "lose") {
                triggerResult("logo", "You lose 1 life, YAY!", -1);
            } else {
                // Gamble Logic
                const roll = Math.random();
                // Normal doors (🚪) have low revive chance (15%), Broken (🪜) have higher (25%)
                let reviveChance = (icon === '🪜') ? 0.25 : 0.15; 
                
                if (roll < reviveChance) {
                    if (lives < maxLives) {
                        // Found a heart (Using explosion as the visual)
                        triggerResult("explosion", "Found a heart! (Somehow)", 1);
                    } else {
                        // Max health, nothing happens (Just an explosion)
                        triggerResult("explosion", "Full health already. Moving on...", 0);
                    }
                } else if (roll < 0.4) {
                    // The King Jumpscare (No life lost)
                    triggerResult("king", "", 0); // Text handled inside the function
                } else {
                    // Nothing happens (Just an explosion and immediate continue)
                    triggerResult("explosion", "Literally nothing.", 0);
                }
            }
        }

        // Handles displaying the correct visual type
        function triggerResult(type, text, lifeMod) {
            lives += lifeMod;
            if (lives > maxLives) lives = maxLives;
            updateLivesDisplay();
            
            jumpMsg.innerText = text;
            overlay.style.display = 'flex';

            if (type === "logo") {
                logoImg.style.display = 'block';
                continueBtn.innerText = "Wow, great.";
            } else if (type === "king") {
                kingDisplay.style.display = 'block';
                jumpMsg.innerText = "Look who it is! (He didn't hurt you)";
                continueBtn.innerText = "Carry on.";
            } else if (type === "explosion") {
                explosionDisplay.style.display = 'block';
                continueBtn.innerText = "Next room, I guess.";
            }
        }

        function closeOverlay() {
            // Hide everything again
            overlay.style.display = 'none';
            logoImg.style.display = 'none';
            kingDisplay.style.display = 'none';
            explosionDisplay.style.display = 'none';
            generateRoom();
        }

        // Initialize first room
        generateRoom();
    </script>
</body>
</html>
