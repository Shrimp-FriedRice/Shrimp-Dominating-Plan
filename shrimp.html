<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrimp Mayhem</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            margin: 10px 0;
            color: #ffcc00;
            text-shadow: 2px 2px 4px #000;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            background-color: #34495e;
            border: 5px solid #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            cursor: crosshair;
        }

        .shrimp {
            position: absolute;
            font-size: 40px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s linear;
        }

        #player {
            z-index: 10;
            filter: drop-shadow(0 0 10px gold);
        }

        #score-board {
            font-size: 24px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>KILL THEM ALL</h1>

    <div id="game-container">
        <div id="player" class="shrimp">🍤</div>
    </div>

    <div id="score-board">Score: <span id="score">0</span></div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score');
        
        let score = 0;
        let victims = [];
        const victimCount = 10;

        // Player movement variables
        let mouseX = 400;
        let mouseY = 250;

        // Track mouse position
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        function spawnVictims() {
            for (let i = 0; i < victimCount; i++) {
                const victim = document.createElement('div');
                victim.className = 'shrimp';
                victim.innerHTML = '🍤';
                
                const x = Math.random() * (container.clientWidth - 50);
                const y = Math.random() * (container.clientHeight - 50);
                
                const victimObj = {
                    element: victim,
                    x: x,
                    y: y,
                    dx: (Math.random() - 0.5) * 4,
                    dy: (Math.random() - 0.5) * 4
                };

                victim.style.left = x + 'px';
                victim.style.top = y + 'px';
                container.appendChild(victim);
                victims.push(victimObj);
            }
        }

        function update() {
            // Update player position (centered on mouse)
            player.style.left = (mouseX - 25) + 'px';
            player.style.top = (mouseY - 25) + 'px';

            // Update victims
            for (let i = victims.length - 1; i >= 0; i--) {
                let v = victims[i];

                // Move
                v.x += v.dx;
                v.y += v.dy;

                // Bounce off walls
                if (v.x <= 0 || v.x >= container.clientWidth - 40) v.dx *= -1;
                if (v.y <= 0 || v.y >= container.clientHeight - 40) v.dy *= -1;

                v.element.style.left = v.x + 'px';
                v.element.style.top = v.y + 'px';

                // Collision detection
                const dist = Math.hypot(mouseX - (v.x + 25), mouseY - (v.y + 25));
                if (dist < 35) {
                    // KILL
                    container.removeChild(v.element);
                    victims.splice(i, 1);
                    score++;
                    scoreElement.innerText = score;
                }
            }

            // Check if board is clear
            if (victims.length === 0) {
                spawnVictims();
            }

            requestAnimationFrame(update);
        }

        // Initialize game
        spawnVictims();
        update();
    </script>
</body>
</html>
