<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrimp City: Kill Them All</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #003366; /* Deep Sea Blue */
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ff4500;
            text-shadow: 2px 2px #000;
        }

        canvas {
            border: 4px solid #fff;
            background: linear-gradient(to bottom, #005c99, #001a33);
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .ui {
            position: absolute;
            top: 70px;
            font-size: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>KILL THEM ALL</h1>
    <div class="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = 800;
        canvas.height = 500;

        let score = 0;
        const keys = {};

        // Player object
        const player = {
            x: 400,
            y: 250,
            size: 40,
            speed: 5,
            emoji: '🍤',
            isAttacking: false,
            attackTimer: 0
        };

        // Enemy list
        let enemies = [];

        function spawnEnemy() {
            enemies.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: 35,
                emoji: '🍤',
                dx: (Math.random() - 0.5) * 2,
                dy: (Math.random() - 0.5) * 2
            });
        }

        // Initial Spawning
        for(let i = 0; i < 8; i++) spawnEnemy();

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            // Movement
            if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

            // Attack logic (Spacebar)
            if (keys['Space'] && !player.isAttacking) {
                player.isAttacking = true;
                player.attackTimer = 15; // frames of attack
                player.speed = 12; // Dash speed
            }

            if (player.isAttacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) {
                    player.isAttacking = false;
                    player.speed = 5;
                }
            }

            // Keep player in bounds
            player.x = Math.max(0, Math.min(canvas.width, player.x));
            player.y = Math.max(0, Math.min(canvas.height, player.y));

            // Update enemies & collision
            enemies.forEach((enemy, index) => {
                enemy.x += enemy.dx;
                enemy.y += enemy.dy;

                // Bounce off walls
                if (enemy.x < 0 || enemy.x > canvas.width) enemy.dx *= -1;
